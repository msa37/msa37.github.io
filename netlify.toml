# Netlify Configuration for Rising Digital IA

[build]
  # Command to build the site
  command = "pnpm build"
  # Directory to publish (output folder from build)
  publish = "dist"
  # Functions directory (if using serverless functions)
  functions = "netlify/functions"

[build.environment]
  # Node.js version
  NODE_VERSION = "18"
  # Package manager
  NPM_FLAGS = "--version"

# Redirects for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache headers for static assets
[[headers]]
  for = "/dist/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Compression
[build]
  publish = "dist"
  
# Environment variables (add in Netlify UI)
# VITE_ANALYTICS_ENDPOINT = your-analytics-endpoint
# VITE_ANALYTICS_WEBSITE_ID = your-website-id
